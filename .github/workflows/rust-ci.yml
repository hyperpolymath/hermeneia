# SPDX-License-Identifier: MPL-2.0
# Rust CI — thin wrapper calling the shared estate reusable in
# hyperpolymath/standards. Configure once, propagate everywhere.
# See: docs/CI-REUSABLE-WORKFLOWS.adoc in standards.
name: Rust CI
on:
  push:
    branches: [main, master]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  rust-ci:
    uses: hyperpolymath/standards/.github/workflows/rust-ci-reusable.yml@e9c8888769a703924cc3c0d717900960d78aea00
